name: merge-direct

on:
  workflow_dispatch: # 支持手动点击运行
  schedule:
    - cron: '0 22 * * *' # 每天北京时间早上 6 点自动运行 (UTC 22:00)

jobs:
  build_and_merge:
    runs-on: ubuntu-latest
    steps:
    # 💡 终极解决方案：直接使用最顶级的 node24 兼容分支，或者官方最新的 v5 预览演进版
    - name: 签出当前仓库代码
      uses: actions/checkout@main
      with:
        persist-credentials: true

    - name: 读取配置文件并合并、重写策略组后缀
      run: |
        # 定义输入源与输出目标
        CONFIG_FILE="source_direct.txt"
        OUTPUT_FILE="rules_direct.list"
        
        echo "==== 开始处理直连规则 (后缀强制重写版) ===="
        
        # 1. 初始化对应的合并文件并写入文件头
        echo "# ==========================================" > $OUTPUT_FILE
        echo "# 我的定制直连合并规则 (策略组重写为 direct)" >> $OUTPUT_FILE
        echo "# 更新时间: $(date -u -d '+8 hours' '+%Y-%m-%d %H:%M:%S') 北京时间" >> $OUTPUT_FILE
        echo "# ==========================================" >> $OUTPUT_FILE
        
        # 2. 检查对应的配置文件是否存在
        if [ ! -f "$CONFIG_FILE" ]; then
          echo "错误：未在仓库根目录找到 $CONFIG_FILE 文件，请先创建它！"
          exit 1
        fi
        
        # 3. 逐行读取配置文件中的链接并进行合并重写
        while IFS= read -r url || [ -n "$url" ]; do
          url=$(echo "$url" | tr -d '\r' | xargs)
          
          if [ -z "$url" ] || [[ "$url" =~ ^# ]]; then
            continue
          fi
          
          echo -e "\n# ------------------------------------------" >> $OUTPUT_FILE
          echo "# 正在合并自: $url" >> $OUTPUT_FILE
          echo "# ------------------------------------------" >> $OUTPUT_FILE
          
          # 下载并清洗内容（保留后缀并重写为 ,direct）
          curl -s "$url" | grep -v '^#' | grep -v '^\s*$' | sed 's/,[^,]*$/,direct/' >> $OUTPUT_FILE
        done < "$CONFIG_FILE"
        
        echo "==== 直连规则处理完成，已生成 $OUTPUT_FILE ===="

    - name: 将新生成的 rules_direct.list 提交回仓库
      run: |
        git config --global user.name "github-actions[bot]"
        git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"
        
        # 检查 rules_direct.list 文件是否有变动并提交
        if [ -n "$(git status --porcelain rules_direct.list)" ]; then
          git add rules_direct.list
          git commit -m "自动更新直连合并规则并重写后缀: $(date -u -d '+8 hours' '+%Y-%m-%d %H:%M:%S')"
          git push origin main
        else
          echo "直连规则内容无变化，跳过本次提交。"
        fi
