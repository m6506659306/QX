name: 目标链接全自动合并(保留后缀)

on:
  workflow_dispatch: # 支持手动点击运行
  schedule:
    - cron: '0 22 * * *' # 每天北京时间早上 6 点自动运行 (UTC 22:00)

jobs:
  build_and_merge:
    runs-on: ubuntu-latest
    steps:
    - name: 签出当前仓库代码
      uses: actions/checkout@v4
      with:
        persist-credentials: true

    - name: 逐个下载、清洗并合并目标链接
      run: |
        # 1. 初始化最终的合并文件并写入文件头
        OUTPUT_FILE="my_combined_rules.list"
        echo "# ==========================================" > $OUTPUT_FILE
        echo "# 我的定制合并规则 (链接提取-保留后缀版)" >> $OUTPUT_FILE
        echo "# 更新时间: $(date -u -d '+8 hours' '+%Y-%m-%d %H:%M:%S') 北京时间" >> $OUTPUT_FILE
        echo "# ==========================================" >> $OUTPUT_FILE
        
        # 2. 定义你需要合并的目标链接
        # ⚠️ 注意：每行放一个链接，并在末尾加上反斜杠 \ 顺延
        URLS=( \
          "https://raw.githubusercontent.com/blackmatrix7/ios_rule_script/master/rule/QuantumultX/WeChat/WeChat.list" \
          "https://raw.githubusercontent.com/blackmatrix7/ios_rule_script/master/rule/QuantumultX/Apple/Apple.list" \
        )

        # 3. 循环遍历下载并清洗内容
        for url in "${URLS[@]}"; do
          echo -e "\n# ------------------------------------------" >> $OUTPUT_FILE
          echo "# 正在合并自: $url" >> $OUTPUT_FILE
          echo "# ------------------------------------------" >> $OUTPUT_FILE
          
          # 核心清洗命令调整：
          # grep -v '^#'          -> 删掉所有以 # 开头的注释行
          # grep -v '^\s*$'       -> 删掉所有空行
          # （已移除末尾删除逻辑，保留完整行）
          curl -s "$url" | grep -v '^#' | grep -v '^\s*$' >> $OUTPUT_FILE
        done

    - name: 将新生成的规则提交回仓库
      run: |
        git config --global user.name "github-actions[bot]"
        git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"
        
        # 检查文件是否有变动
        if [ -n "$(git status --porcelain)" ]; then
          git add my_combined_rules.list
          git commit -m "自动更新合并规则: $(date -u -d '+8 hours' '+%Y-%m-%d %H:%M:%S')"
          git push origin main
        else
          echo "规则内容无变化，跳过本次提交。"
        fi
